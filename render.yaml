services:
  # 1. FastAPI Backend (runs in-memory SQLite and mock Redis fallback automatically)
  - type: web
    name: pulseguard-backend
    runtime: python
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: OPENROUTER_API_KEY
        sync: false # User will fill this in Render UI
      - key: GROQ_MODEL
        value: llama3-8b-8192
