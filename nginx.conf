events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name localhost;

        # WebSocket and general headers support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Route WebSocket connection manager traffic
        location /api/ws {
            proxy_pass http://web:8000/api/ws;
        }

        # Route standard API endpoints
        location /api {
            proxy_pass http://web:8000/api;
        }

        # Route OpenAPI documentation
        location /docs {
            proxy_pass http://web:8000/docs;
        }

        location /openapi.json {
            proxy_pass http://web:8000/openapi.json;
        }

        # Route everything else to the Next.js client
        location / {
            proxy_pass http://client:3000;
        }
    }
}
